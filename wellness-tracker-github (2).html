<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sprout — Wellness Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #E8F1E2;
    --bg-deep: #DCEAD3;
    --card: #F8FBF4;
    --sage: #9FBF8E;
    --sage-dark: #6F9760;
    --sage-pale: #D3E6C9;
    --brown-deep: #4A3A28;
    --brown-soft: #8A6F52;
    --brown-faint: #B7A188;
    --gold: #C9A15F;
    --terracotta: #BE8467;
    --border: #D7E5CB;
    --shadow: 0 2px 14px rgba(74,58,40,0.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background: linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
    color: var(--brown-deep);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:680px;margin:0 auto;padding:28px 20px 60px;}
  @media (min-width:700px){
    .app{max-width:960px;padding:36px 40px 70px;}
  }
  header.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand svg{width:30px;height:30px;}
  .brand h1{font-family:'Fraunces',serif;font-weight:600;font-size:1.5rem;margin:0;letter-spacing:0.2px;}
  .date-pill{font-size:0.8rem;color:var(--brown-soft);background:var(--card);border:1px solid var(--border);padding:6px 12px;border-radius:20px;white-space:nowrap;}

  nav.tabs{display:flex;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:5px;margin-bottom:20px;box-shadow:var(--shadow);}
  nav.tabs button{flex:1;border:none;background:transparent;padding:10px 6px;border-radius:12px;font-family:'Inter',sans-serif;font-weight:600;font-size:0.82rem;color:var(--brown-soft);cursor:pointer;transition:all .15s ease;}
  nav.tabs button.active{background:var(--sage);color:#fff;box-shadow:0 2px 8px rgba(111,151,96,0.35);}
  nav.tabs button:not(.active):hover{background:var(--sage-pale);}

  /* Cards always stack full-width, one per row — no side-by-side grid. */
  .card-grid{display:block;}

  .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow);}
  .card h2{font-family:'Fraunces',serif;font-weight:600;font-size:1.05rem;margin:0 0 14px;color:var(--brown-deep);}
  .muted{color:var(--brown-faint);font-size:0.82rem;}

  /* Dashboard ring */
  .ring-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;}
  .ring-wrap svg{flex-shrink:0;}
  .ring-below{display:flex;flex-direction:column;align-items:center;}
  .ring-num{font-family:'Fraunces',serif;font-size:1.9rem;font-weight:600;}
  .ring-label{font-size:0.78rem;color:var(--brown-soft);margin-top:2px;}
  .stat-row{display:flex;gap:14px;margin-top:14px;flex-wrap:wrap;}
  .stat-box{flex:1 1 120px;background:var(--sage-pale);border-radius:14px;padding:10px 12px;text-align:center;}
  .stat-box .n{font-family:'Fraunces',serif;font-size:1.15rem;font-weight:600;color:var(--brown-deep);}
  .stat-box .l{font-size:0.68rem;color:var(--brown-soft);text-transform:uppercase;letter-spacing:0.4px;}

  /* Leaf streak */
  .leaf-row{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;justify-content:space-between;}
  .leaf{width:26px;height:26px;}
  .leaf-day-label{font-size:0.62rem;color:var(--brown-faint);text-align:center;width:26px;}
  .leaf-day-label.today{color:var(--sage-dark);font-weight:700;}
  .leaf-col{display:flex;flex-direction:column;align-items:center;gap:4px;}

  /* Forms */
  .row{display:flex;gap:8px;margin-bottom:10px;}
  input, select{
    font-family:'Inter',sans-serif;
    border:1px solid var(--border);
    background:#fff;
    border-radius:10px;
    padding:9px 11px;
    font-size:0.88rem;
    color:var(--brown-deep);
    outline:none;
  }
  input:focus, select:focus{border-color:var(--sage-dark);}
  input[type="text"], input[type="number"]{flex:1;min-width:0;}
  button.primary{
    background:var(--sage-dark);color:#fff;border:none;border-radius:10px;
    padding:9px 16px;font-weight:600;font-size:0.85rem;cursor:pointer;
  }
  button.primary:hover{background:#5f8551;}
  button.ghost{background:transparent;border:1px solid var(--border);color:var(--brown-soft);border-radius:10px;padding:8px 12px;font-size:0.8rem;cursor:pointer;}
  button.ghost:hover{background:var(--sage-pale);}

  .entry{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px dashed var(--border);}
  .entry:last-child{border-bottom:none;}
  .entry .meta{display:flex;flex-direction:column;}
  .entry .meta .name{font-weight:600;font-size:0.9rem;}
  .entry .meta .tag{font-size:0.7rem;color:var(--brown-soft);text-transform:capitalize;}
  .entry .cal{font-family:'Fraunces',serif;font-weight:600;color:var(--sage-dark);}
  .del{background:none;border:none;color:var(--terracotta);font-size:0.75rem;cursor:pointer;margin-left:10px;}

  .workout-item{display:flex;align-items:center;justify-content:space-between;background:var(--sage-pale);border-radius:14px;padding:12px 14px;margin-bottom:10px;}
  .workout-item .wname{font-weight:600;font-size:0.9rem;}
  .checkbtn{width:34px;height:34px;border-radius:50%;border:2px solid var(--sage-dark);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .checkbtn.done{background:var(--sage-dark);}
  .checkbtn.done svg{stroke:#fff;}
  .checkbtn svg{width:16px;height:16px;stroke:var(--sage-dark);stroke-width:3;fill:none;}

  .empty{text-align:center;padding:22px 10px;color:var(--brown-faint);font-size:0.85rem;}

  /* progress chart */
  svg.chart{width:100%;height:150px;}
  .weight-entry{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--border);font-size:0.85rem;}
  .weight-entry:last-child{border-bottom:none;}

  footer.note{text-align:center;font-size:0.72rem;color:var(--brown-faint);margin-top:10px;line-height:1.5;}

  .celebrate{
    margin-top:12px;
    background: linear-gradient(135deg, #F3C9DE, #E7D9A8);
    color: var(--brown-deep);
    border-radius:14px;
    padding:10px 14px;
    font-size:0.85rem;
    font-weight:600;
    text-align:center;
  }

  .protein-bar-wrap{margin-top:14px;}
  .protein-bar-label{display:flex;justify-content:space-between;font-size:0.78rem;color:var(--brown-soft);margin-bottom:6px;}
  .protein-bar-label strong{color:var(--brown-deep);font-family:'Fraunces',serif;font-size:0.9rem;}
  .protein-bar-track{background:#D7E5CB;border-radius:20px;height:12px;overflow:hidden;}
  .protein-bar-fill{height:100%;border-radius:20px;background:linear-gradient(90deg, #9FBF8E, #6F9760);transition:width .3s ease;}
  .protein-bar-fill.over{background:linear-gradient(90deg, #E7D9A8, #C9A15F);}

  .check-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:0.85rem;color:var(--brown-soft);}
  .check-row input[type="checkbox"]{width:16px;height:16px;accent-color:var(--sage-dark);}

  .saved-meal-item{display:flex;align-items:center;justify-content:space-between;background:var(--sage-pale);border-radius:14px;padding:10px 14px;margin-bottom:8px;}
  .saved-meal-item .meta .name{font-weight:600;font-size:0.88rem;}
  .saved-meal-item .meta .tag{font-size:0.7rem;color:var(--brown-soft);text-transform:capitalize;}
  .saved-meal-item .actions{display:flex;align-items:center;gap:10px;}
  .add-btn{background:var(--sage-dark);color:#fff;border:none;border-radius:10px;padding:6px 12px;font-size:0.78rem;font-weight:600;cursor:pointer;}
  .add-btn:hover{background:#5f8551;}

  .ref-details summary{
    font-family:'Fraunces',serif;font-weight:600;font-size:1.05rem;color:var(--brown-deep);
    cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:space-between;
    padding:2px 0;
  }
  .ref-details summary::-webkit-details-marker{display:none;}
  .ref-details summary::after{
    content:'▾';color:var(--sage-dark);font-size:0.85rem;transition:transform .2s ease;margin-left:10px;
  }
  .ref-details[open] summary::after{transform:rotate(180deg);}
  .ref-details .ref-body{margin-top:14px;}
</style>
</head>
<body>
<div class="app">

  <header class="top">
    <div class="brand">
      <svg viewBox="0 0 32 32" fill="none"><path d="M16 29C16 29 6 24 6 14C6 7 11 3 16 3C21 3 26 7 26 14C26 24 16 29 16 29Z" fill="#9FBF8E" stroke="#6F9760" stroke-width="1.5"/><path d="M16 29V10" stroke="#6F9760" stroke-width="1.5" stroke-linecap="round"/></svg>
      <h1>Sprout</h1>
    </div>
    <div class="date-pill" id="todayPill"></div>
  </header>

  <nav class="tabs">
    <button data-tab="dashboard" class="active">Today</button>
    <button data-tab="meals">Meals</button>
    <button data-tab="workouts">Workouts</button>
    <button data-tab="progress">Progress</button>
  </nav>

  <div id="tab-dashboard"></div>
  <div id="tab-meals" style="display:none;"></div>
  <div id="tab-workouts" style="display:none;"></div>
  <div id="tab-progress" style="display:none;"></div>
</div>

<script>
const LEAF_FILLED = `<svg class="leaf" viewBox="0 0 26 26"><path d="M13 23C13 23 5 19 5 11.5C5 6.5 8.5 3 13 3C17.5 3 21 6.5 21 11.5C21 19 13 23 13 23Z" fill="#6F9760" stroke="#4A3A28" stroke-width="1"/></svg>`;
const LEAF_EMPTY = `<svg class="leaf" viewBox="0 0 26 26"><path d="M13 23C13 23 5 19 5 11.5C5 6.5 8.5 3 13 3C17.5 3 21 6.5 21 11.5C21 19 13 23 13 23Z" fill="#F8FBF4" stroke="#D7E5CB" stroke-width="1.5"/></svg>`;
// Same leaf shape, but with a small flower blooming at the tip — shown on days a workout was logged
const LEAF_FLOWER = `<svg class="leaf" viewBox="0 0 26 26">
  <path d="M13 23C13 23 5 19 5 11.5C5 6.5 8.5 3 13 3C17.5 3 21 6.5 21 11.5C21 19 13 23 13 23Z" fill="#6F9760" stroke="#4A3A28" stroke-width="1"/>
  <g transform="translate(13,6)">
    <circle cx="0" cy="-3.2" r="2.1" fill="#F3C9DE"/>
    <circle cx="3" cy="-1" r="2.1" fill="#F3C9DE"/>
    <circle cx="-3" cy="-1" r="2.1" fill="#F3C9DE"/>
    <circle cx="1.8" cy="1.8" r="2.1" fill="#F3C9DE"/>
    <circle cx="-1.8" cy="1.8" r="2.1" fill="#F3C9DE"/>
    <circle cx="0" cy="0" r="1.9" fill="#C9A15F"/>
  </g>
</svg>`;

let SETTINGS = null;
let WEIGHTS = [];
const todayStr = () => {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
};
const dateNDaysAgo = (n) => {
  const d = new Date();
  d.setDate(d.getDate()-n);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
};

// Storage layer: plain browser localStorage, so this works on GitHub Pages,
// opened as a local file, or anywhere else — no external API needed.
function lsGet(key){
  try{
    const v = localStorage.getItem(key);
    return v ? v : null;
  }catch(e){ console.error('Storage read failed', e); return null; }
}
function lsSet(key, value){
  try{ localStorage.setItem(key, value); return true; }
  catch(e){ console.error('Storage write failed', e); return false; }
}

async function loadSettings(){
  const v = lsGet('sprout:settings');
  return v ? JSON.parse(v) : defaultSettings();
}
function defaultSettings(){
  return {
    calorieTarget: 1800,
    proteinTarget: 110,
    startWeight: 90,
    goalWeight: 75,
    workouts: ["Full Body A","Full Body B","Cardio + Core"]
  };
}
async function saveSettings(s){
  lsSet('sprout:settings', JSON.stringify(s));
}
async function loadDay(dateStr){
  const v = lsGet('sprout:day:'+dateStr);
  return v ? JSON.parse(v) : {meals:[], workouts:{}, steps:null};
}
async function saveDay(dateStr, data){
  lsSet('sprout:day:'+dateStr, JSON.stringify(data));
}
async function loadWeights(){
  const v = lsGet('sprout:weights');
  return v ? JSON.parse(v) : [];
}
async function saveWeights(arr){
  lsSet('sprout:weights', JSON.stringify(arr));
}
async function loadSavedMeals(){
  const v = lsGet('sprout:savedMeals');
  return v ? JSON.parse(v) : [];
}
async function saveSavedMeals(arr){
  lsSet('sprout:savedMeals', JSON.stringify(arr));
}

function downloadJSON(obj, filename){
  const blob = new Blob([JSON.stringify(obj, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function exportAllData(){
  const data = {exportedAt: new Date().toISOString(), days:{}};
  try{
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(!k.startsWith('sprout:')) continue;
      const shortKey = k.slice('sprout:'.length);
      if(shortKey==='settings'){ data.settings = SETTINGS; }
      else if(shortKey==='weights'){ data.weights = await loadWeights(); }
      else if(shortKey==='savedMeals'){ data.savedMeals = await loadSavedMeals(); }
      else if(shortKey.startsWith('day:')){
        const dateStr = shortKey.slice(4);
        data.days[dateStr] = await loadDay(dateStr);
      }
    }
  }catch(e){ console.error('Export failed', e); }
  downloadJSON(data, 'sprout-backup-'+todayStr()+'.json');
}

async function importAllData(data){
  if(data.settings){ SETTINGS = {...SETTINGS, ...data.settings}; await saveSettings(SETTINGS); }
  if(data.weights){ await saveWeights(data.weights); }
  if(data.savedMeals){ await saveSavedMeals(data.savedMeals); }
  if(data.days){
    for(const [dateStr, dayData] of Object.entries(data.days)){
      await saveDay(dateStr, dayData);
    }
  }
}

function uid(){ return Math.random().toString(36).slice(2,9); }

// ---------- DASHBOARD ----------
async function renderDashboard(){
  const el = document.getElementById('tab-dashboard');
  el.innerHTML = '<div class="empty">Loading…</div>';
  const day = await loadDay(todayStr());
  const totalCal = day.meals.reduce((s,m)=>s+Number(m.cal||0),0);
  const totalProtein = day.meals.reduce((s,m)=>s+Number(m.protein||0),0);
  const target = SETTINGS.calorieTarget;
  const pct = Math.min(100, Math.round((totalCal/target)*100));
  const circumference = 2*Math.PI*54;
  const dash = circumference*(pct/100);
  const workoutsDoneCount = Object.values(day.workouts||{}).filter(Boolean).length + ((day.otherWorkout && day.otherWorkout.done) ? 1 : 0);
  const stepsCelebrate = day.steps!=null && day.steps>=8000;

  // 7 day leaf streak
  let leafDays = [];
  for(let i=6;i>=0;i--){
    const ds = dateNDaysAgo(i);
    const d = await loadDay(ds);
    const workoutDone = (d.workouts && Object.values(d.workouts).some(v=>v)) || (d.otherWorkout && d.otherWorkout.done);
    const mealLogged = d.meals && d.meals.length>0;
    const logged = mealLogged || workoutDone;
    const dow = new Date(ds+'T00:00:00').toLocaleDateString('en-US',{weekday:'short'}).slice(0,1);
    leafDays.push({dow, logged, workoutDone, isToday: ds===todayStr()});
  }

  el.innerHTML = `
    <div class="card-grid">
    <div class="card">
      <h2>Calories today</h2>
      <div class="ring-wrap">
        <svg width="150" height="150" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="54" fill="none" stroke="#D7E5CB" stroke-width="10"/>
          <circle cx="60" cy="60" r="54" fill="none" stroke="${pct>=100?'#BE8467':'#6F9760'}" stroke-width="10"
            stroke-dasharray="${circumference}" stroke-dashoffset="${circumference-dash}" stroke-linecap="round"
            transform="rotate(-90 60 60)"/>
          <text x="60" y="56" text-anchor="middle" font-family="Fraunces, serif" font-size="22" font-weight="600" fill="#4A3A28">${totalCal}</text>
          <text x="60" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8A6F52">of ${target} kcal</text>
        </svg>
        <div class="ring-below">
          <div class="ring-num">${target-totalCal>=0?target-totalCal:0}</div>
          <div class="ring-label">kcal remaining today</div>
        </div>
      </div>
      <div class="stat-row">
        <div class="stat-box"><div class="n">${workoutsDoneCount}</div><div class="l">Workouts</div></div>
        <div class="stat-box"><div class="n">${day.steps!=null?day.steps.toLocaleString():'—'}</div><div class="l">Steps</div></div>
      </div>
      <div class="protein-bar-wrap">
        <div class="protein-bar-label"><span>Protein</span><strong>${totalProtein}g / ${SETTINGS.proteinTarget}g</strong></div>
        <div class="protein-bar-track"><div class="protein-bar-fill ${totalProtein>=SETTINGS.proteinTarget?'over':''}" style="width:${Math.min(100, Math.round((totalProtein/SETTINGS.proteinTarget)*100))}%;"></div></div>
      </div>
      ${stepsCelebrate ? `<div class="celebrate">🌸 8,000+ steps today — that's a full bloom! Nicely done.</div>` : ''}
    </div>

    <div class="card">
      <h2>This week</h2>
      <div class="leaf-row">
        ${leafDays.map(l=>`<div class="leaf-col">${l.workoutDone?LEAF_FLOWER:(l.logged?LEAF_FILLED:LEAF_EMPTY)}<div class="leaf-day-label ${l.isToday?'today':''}">${l.dow}</div></div>`).join('')}
      </div>
      <div class="muted" style="margin-top:10px;">A leaf fills in on any day you log a meal — it blooms into a flower on days you complete a workout.</div>
    </div>
    </div>
  `;
}

// ---------- MEALS ----------
async function renderMeals(){
  const el = document.getElementById('tab-meals');
  const day = await loadDay(todayStr());
  const totalCal = day.meals.reduce((s,m)=>s+Number(m.cal||0),0);
  const saved = await loadSavedMeals();

  el.innerHTML = `
    <div class="card-grid">
    <div class="card">
      <h2>Log a meal — ${totalCal} kcal so far today</h2>
      <div class="row">
        <select id="mealType">
          <option value="breakfast">Breakfast</option>
          <option value="lunch">Lunch</option>
          <option value="dinner">Dinner</option>
          <option value="snack">Snack</option>
        </select>
      </div>
      <div class="row">
        <input type="text" id="mealName" placeholder="What did you eat?">
      </div>
      <div class="row">
        <input type="number" id="mealCal" placeholder="Calories">
        <input type="number" id="mealProtein" placeholder="Protein (g, optional)">
      </div>
      <div class="check-row">
        <input type="checkbox" id="saveMealCheck">
        <label for="saveMealCheck">Save this meal so I can quick-add it again later</label>
      </div>
      <button class="primary" id="addMealBtn">Add</button>
    </div>

    <div class="card">
      <h2>Today's meals</h2>
      <div id="mealList">
        ${day.meals.length===0 ? '<div class="empty">Nothing logged yet — add your first meal above.</div>' :
          day.meals.map(m=>`
            <div class="entry">
              <div class="meta"><div class="name">${escapeHtml(m.name)}</div><div class="tag">${m.type}${m.protein?` · ${m.protein}g protein`:''}</div></div>
              <div style="display:flex;align-items:center;">
                <div class="cal">${m.cal} kcal</div>
                <button class="del" data-id="${m.id}">remove</button>
              </div>
            </div>`).join('')}
      </div>
    </div>

    <div class="card">
      <h2>Saved meals</h2>
      ${saved.length>0 ? `<div class="row"><input type="text" id="savedMealSearch" placeholder="Search saved meals…"></div>` : ''}
      <div id="savedMealList">
        ${saved.length===0 ? '<div class="empty">No saved meals yet — check "save this meal" when logging one to build your list.</div>' :
          saved.map(m=>`
            <div class="saved-meal-item" data-searchname="${escapeHtml(m.name.toLowerCase())}">
              <div class="meta"><div class="name">${escapeHtml(m.name)}</div><div class="tag">${m.type} · ${m.cal} kcal${m.protein?` · ${m.protein}g protein`:''}</div></div>
              <div class="actions">
                <button class="add-btn" data-savedid="${m.id}">+ Add to today</button>
                <button class="del" data-savedremove="${m.id}">remove</button>
              </div>
            </div>
          `).join('')}
      </div>
    </div>
    </div>
  `;

  const searchInput = document.getElementById('savedMealSearch');
  if(searchInput){
    searchInput.oninput = ()=>{
      const q = searchInput.value.trim().toLowerCase();
      document.querySelectorAll('#savedMealList .saved-meal-item').forEach(item=>{
        item.style.display = item.dataset.searchname.includes(q) ? '' : 'none';
      });
    };
  }

  document.getElementById('addMealBtn').onclick = async ()=>{
    const name = document.getElementById('mealName').value.trim();
    const cal = document.getElementById('mealCal').value;
    const protein = document.getElementById('mealProtein').value;
    const type = document.getElementById('mealType').value;
    const shouldSave = document.getElementById('saveMealCheck').checked;
    if(!name || !cal) return;
    const d = await loadDay(todayStr());
    d.meals.push({id:uid(), name, cal:Number(cal), protein:Number(protein||0), type});
    await saveDay(todayStr(), d);

    if(shouldSave){
      let savedArr = await loadSavedMeals();
      // avoid duplicate entries for the same name+type; update it instead
      const existing = savedArr.find(m=>m.name.toLowerCase()===name.toLowerCase() && m.type===type);
      if(existing){
        existing.cal = Number(cal);
        existing.protein = Number(protein||0);
      } else {
        savedArr.push({id:uid(), name, cal:Number(cal), protein:Number(protein||0), type});
      }
      await saveSavedMeals(savedArr);
    }

    renderMeals();
    renderDashboard();
  };
  el.querySelectorAll('.del[data-id]').forEach(btn=>{
    btn.onclick = async ()=>{
      const d = await loadDay(todayStr());
      d.meals = d.meals.filter(m=>m.id!==btn.dataset.id);
      await saveDay(todayStr(), d);
      renderMeals();
      renderDashboard();
    };
  });
  el.querySelectorAll('.add-btn[data-savedid]').forEach(btn=>{
    btn.onclick = async ()=>{
      const savedArr = await loadSavedMeals();
      const m = savedArr.find(x=>x.id===btn.dataset.savedid);
      if(!m) return;
      const d = await loadDay(todayStr());
      d.meals.push({id:uid(), name:m.name, cal:m.cal, protein:m.protein, type:m.type});
      await saveDay(todayStr(), d);
      renderMeals();
      renderDashboard();
    };
  });
  el.querySelectorAll('.del[data-savedremove]').forEach(btn=>{
    btn.onclick = async ()=>{
      let savedArr = await loadSavedMeals();
      savedArr = savedArr.filter(m=>m.id!==btn.dataset.savedremove);
      await saveSavedMeals(savedArr);
      renderMeals();
    };
  });
}

      </div>
      <div class="muted">Aiming for 7,000–8,000 steps/day is a solid, sustainable target alongside your workouts.</div>
      ${stepsCelebrate ? `<div class="celebrate">🌸 8,000+ steps today — that's a full bloom! Nicely done.</div>` : ''}
    </div>

    <div class="card">
      <details class="ref-details">
        <summary>Reference: your routines</summary>
        <div class="ref-body">
          ${workouts.filter(w=>WORKOUT_DETAILS[w]).map(w=>`
            <div style="margin-bottom:16px;">
              <div class="wname" style="margin-bottom:2px;">${escapeHtml(w)}</div>
              <div class="tag" style="margin-bottom:8px;">${WORKOUT_DETAILS[w].subtitle}</div>

// ---------- PROGRESS ----------
async function getWeekOverview(){
  // Walks the last 7 days plus computes a running streak of consecutive logged days
  let days = [];
  for(let i=6;i>=0;i--){
    const ds = dateNDaysAgo(i);
    const d = await loadDay(ds);
    const totalCal = (d.meals||[]).reduce((s,m)=>s+Number(m.cal||0),0);
    const mealLogged = d.meals && d.meals.length>0;
    const workoutDone = (d.workouts && Object.values(d.workouts).some(v=>v)) || (d.otherWorkout && d.otherWorkout.done);
    const logged = mealLogged || workoutDone;
    days.push({date:ds, totalCal, mealLogged, workoutDone, logged, steps:d.steps});
  }
  const loggedCalDays = days.filter(d=>d.mealLogged);
  const avgCal = loggedCalDays.length ? Math.round(loggedCalDays.reduce((s,d)=>s+d.totalCal,0)/loggedCalDays.length) : null;

  const loggedStepDays = days.filter(d=>d.steps!=null);
  const avgSteps = loggedStepDays.length ? Math.round(loggedStepDays.reduce((s,d)=>s+d.steps,0)/loggedStepDays.length) : null;

  // streak: count backward from today, stop at first day with nothing logged
  let streak = 0;
  for(let i=days.length-1;i>=0;i--){
    if(days[i].logged) streak++;
    else break;
  }
  return {days, avgCal, avgSteps, streak};
}

async function renderProgress(){
  const el = document.getElementById('tab-progress');
  el.innerHTML = '<div class="empty">Loading…</div>';
  WEIGHTS = await loadWeights();
  const week = await getWeekOverview();
  const sorted = [...WEIGHTS].sort((a,b)=>a.date.localeCompare(b.date));
  const latest = sorted.length ? sorted[sorted.length-1].kg : SETTINGS.startWeight;
  const totalToLose = SETTINGS.startWeight - SETTINGS.goalWeight;
  const lostSoFar = SETTINGS.startWeight - latest;
  const pct = totalToLose>0 ? Math.max(0,Math.min(100, Math.round((lostSoFar/totalToLose)*100))) : 0;

  let chartSvg = '<div class="empty">Log a weight below to start your trend line.</div>';
  if(sorted.length>=1){
    const w = 560, h=140, pad=20;
    const vals = sorted.map(s=>s.kg);
    const minV = Math.min(...vals, SETTINGS.goalWeight)-1;
    const maxV = Math.max(...vals, SETTINGS.startWeight)+1;
    const pts = sorted.map((s,i)=>{
      const x = sorted.length===1? pad : pad + i*((w-2*pad)/(sorted.length-1));
      const y = h-pad - ((s.kg-minV)/(maxV-minV))*(h-2*pad);
      return [x,y];
    });
    const path = pts.map((p,i)=> (i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
    const goalY = h-pad - ((SETTINGS.goalWeight-minV)/(maxV-minV))*(h-2*pad);
    chartSvg = `<svg class="chart" viewBox="0 0 ${w} ${h}">
      <line x1="${pad}" y1="${goalY}" x2="${w-pad}" y2="${goalY}" stroke="#C9A15F" stroke-width="1.5" stroke-dasharray="4,4"/>
      <text x="${w-pad}" y="${goalY-6}" text-anchor="end" font-size="10" fill="#C9A15F">goal ${SETTINGS.goalWeight}kg</text>
      <path d="${path}" fill="none" stroke="#6F9760" stroke-width="2.5"/>
      ${pts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="3.5" fill="#4A3A28"/>`).join('')}
    </svg>`;
  }

  el.innerHTML = `
    <div class="card-grid">
    <div class="card">
      <h2>Weight trend</h2>
      ${chartSvg}
      <div class="stat-row">
        <div class="stat-box"><div class="n">${latest}kg</div><div class="l">Current</div></div>
        <div class="stat-box"><div class="n">${lostSoFar>=0?lostSoFar.toFixed(1):0}kg</div><div class="l">Lost so far</div></div>
        <div class="stat-box"><div class="n">${pct}%</div><div class="l">To goal</div></div>
      </div>
    </div>

    <div class="card">
      <h2>This week</h2>
      <div class="stat-row">
        <div class="stat-box"><div class="n">${week.avgCal!=null?week.avgCal:'—'}</div><div class="l">Avg kcal/day</div></div>
        <div class="stat-box"><div class="n">${week.avgSteps!=null?week.avgSteps.toLocaleString():'—'}</div><div class="l">Avg steps/day</div></div>
        <div class="stat-box"><div class="n">${week.streak}</div><div class="l">Day streak</div></div>
      </div>
      <div class="leaf-row" style="margin-top:14px;">
        ${week.days.map(d=>{
          const dow = new Date(d.date+'T00:00:00').toLocaleDateString('en-US',{weekday:'short'}).slice(0,1);
          const isToday = d.date===todayStr();
          const icon = d.workoutDone ? LEAF_FLOWER : (d.logged ? LEAF_FILLED : LEAF_EMPTY);
          return `<div class="leaf-col">${icon}<div class="leaf-day-label ${isToday?'today':''}">${dow}</div></div>`;
        }).join('')}
      </div>
      <div class="muted" style="margin-top:10px;">${week.avgCal!=null ? `Average is based on the ${week.days.filter(d=>d.mealLogged).length} day(s) you logged meals this week.` : 'Log a meal to start seeing your weekly average.'}</div>
    </div>

    <div class="card">
      <h2>Log your weight</h2>
      <div class="row">
        <input type="date" id="wDate" value="${todayStr()}">
        <input type="number" step="0.1" id="wKg" placeholder="kg">
        <button class="primary" id="addWeightBtn">Save</button>
      </div>
      <div id="weightList">
        ${sorted.length===0?'':sorted.slice().reverse().slice(0,10).map(s=>`
          <div class="weight-entry"><span>${s.date}</span><span>${s.kg} kg</span></div>
        `).join('')}
      </div>
    </div>

    <div class="card">
      <h2>Backup</h2>
      <div class="row">
        <button class="primary" id="exportBtn">Export data</button>
        <label class="add-btn" style="cursor:pointer;display:inline-flex;align-items:center;">
          Import data
          <input type="file" id="importFile" accept="application/json" style="display:none;">
        </label>
      </div>
      <div class="muted">Export saves everything — meals, workouts, weights, saved meals, and settings — as a JSON file. Import restores from a file you exported before.</div>
      <div id="importStatus" class="muted" style="margin-top:6px;"></div>
    </div>
    </div>
  `;
  document.getElementById('addWeightBtn').onclick = async ()=>{
    const date = document.getElementById('wDate').value;
    const kg = document.getElementById('wKg').value;
    if(!date || !kg) return;
    let arr = await loadWeights();
    arr = arr.filter(w=>w.date!==date);
    arr.push({date, kg:Number(kg)});
    await saveWeights(arr);
    renderProgress();
  };
  document.getElementById('exportBtn').onclick = exportAllData;
  document.getElementById('importFile').onchange = async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const statusEl = document.getElementById('importStatus');
    try{
      const text = await file.text();
      const data = JSON.parse(text);
      await importAllData(data);
      SETTINGS = await loadSettings();
      statusEl.textContent = 'Import complete.';
      renderProgress();
      renderDashboard();
    }catch(err){
      statusEl.textContent = "Import failed — that file wasn't valid.";
      console.error(err);
    }
  };
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function setupTabs(){
  const buttons = document.querySelectorAll('nav.tabs button');
  buttons.forEach(btn=>{
    btn.onclick = ()=>{
      buttons.forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('[id^="tab-"]').forEach(t=>t.style.display='none');
      document.getElementById('tab-'+btn.dataset.tab).style.display='block';
      if(btn.dataset.tab==='dashboard') renderDashboard();
      if(btn.dataset.tab==='meals') renderMeals();
      if(btn.dataset.tab==='workouts') renderWorkouts();
      if(btn.dataset.tab==='progress') renderProgress();
    };
  });
}

async function init(){
  document.getElementById('todayPill').textContent = new Date().toLocaleDateString('en-US',{weekday:'long', month:'short', day:'numeric'});
  SETTINGS = await loadSettings();
  await saveSettings(SETTINGS);
  setupTabs();
  renderDashboard();
}
init();
</script>
